name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

# Explicitly declare permissions at the workflow root
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Re-verify permissions inside the deployment runner instance
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to Node 22 to clear deprecation alerts smoothly
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to Live Web Pages Server
        id: deployment
        uses: actions/deploy-pages@v4