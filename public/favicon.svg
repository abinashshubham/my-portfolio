<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Cyberpunk Neon Color Gradients -->
    <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="cyberPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2575fc" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <!-- Dynamic Theme Adaptive Style Engine -->
    <style>
      .structural-base { fill: #0a0f1d; transition: fill 0.3s ease; }
      .grid-line { stroke: rgba(0, 242, 254, 0.15); stroke-width: 4; stroke-dasharray: 8 8; }
      .core-geometry { stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      
      /* Light Mode System Override to guarantee high visibility */
      @media (prefers-color-scheme: light) {
        .structural-base { fill: #f8fafc; }
        .grid-line { stroke: rgba(10, 15, 29, 0.1); }
      }
    </style>
  </defs>

  <!-- Deep space background shield layer -->
  <rect width="512" height="512" rx="128" class="structural-base" />

  <!-- Subtle background engineering structural alignment crosshairs -->
  <line x1="256" y1="64" x2="256" y2="448" class="grid-line" />
  <line x1="64" y1="256" x2="448" y2="256" class="grid-line" />
  <circle cx="256" cy="256" r="160" fill="none" class="grid-line" />

  <!-- The Interlocking 'A' Structural Matrix Geometry Layer -->
  <g>
    <!-- Left structural foundation beam -->
    <line x1="256" y1="96" x2="128" y2="384" stroke="url(#cyberCyan)" class="core-geometry" />
    
    <!-- Right structural foundation beam -->
    <line x1="256" y1="96" x2="384" y2="384" stroke="url(#cyberPurple)" class="core-geometry" />
    
    <!-- Interlocking code brace element (Structural horizontal fit segment) -->
    <path d="M 170 288 L 342 288 L 290 236" fill="none" stroke="url(#cyberCyan)" class="core-geometry" stroke-width="24" />
    
    <!-- Floating compilation terminal apex node -->
    <circle cx="256" cy="96" r="20" fill="#ffffff" filter="drop-shadow(0px 0px 8px #00f2fe)" />
  </g>
</svg>
